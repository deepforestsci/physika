name: code formatting

on:
  pull_request:

jobs:
  lint:
    name: Lint ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: yapf (formatting)
        continue-on-error: true
        run: |
          CHANGED_FILES=`git diff --name-only $COMMIT_RANGE | grep .py$ || true`
          if [ -n "$CHANGED_FILES" ]; then
            yapf -d $CHANGED_FILES
          fi

      - name: flake8 (code style)
        if: ${{ (success() || failure()) && (steps.install.outcome == 'failure' || steps.install.outcome == 'success') }}
        shell: bash -l {0}
        run: flake8 .

      - name: mypy (type annotations)
        if: ${{ (success() || failure()) && (steps.install.outcome == 'failure' || steps.install.outcome == 'success') }}
        shell: bash -l {0}
        run: mypy . --ignore-missing-imports --exclude examples/

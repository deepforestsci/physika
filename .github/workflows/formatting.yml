name: code formatting

on:
  pull_request:

jobs:
  lint:
    name: Lint ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        id: install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: yapf (formatting)
        run: |
          DIFF=$(yapf -d --recursive . || true)
          if [ -n "$DIFF" ]; then
            echo "$DIFF"
            echo "--- $(echo "$DIFF" | grep -c '^---') file(s) need reformatting"
            exit 1
          fi

      - name: flake8 (code style)
        if: success() || failure()
        run: |
          flake8 . --exclude examples,parsetab.py,parser.out,*.egg-info --statistics --count

      - name: mypy (type annotations)
        if: success() || failure()
        run: mypy . --ignore-missing-imports --exclude examples/
